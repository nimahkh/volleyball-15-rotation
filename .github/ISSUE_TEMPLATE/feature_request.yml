name: Feature request
description: Suggest an idea or enhancement.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion. Please describe the problem and the proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

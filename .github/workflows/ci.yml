name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  lint_typecheck_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Agent Browser
        run: npx agent-browser install --with-deps
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Agent Browser UX check
        run: npm run ux:agent
      - name: Upload Agent Browser screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-browser-screenshots
          path: artifacts/agent-browser
          if-no-files-found: ignore

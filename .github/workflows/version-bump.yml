name: Version Bump

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump_version:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Determine bump type
        id: bump
        run: |
          title="${{ github.event.pull_request.title }}"
          shopt -s nocasematch
          if [[ "$title" == *feat* ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif [[ "$title" == *fix* ]]; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if no bump needed
        if: ${{ steps.bump.outputs.type == 'none' }}
        run: echo "No version bump required."

      - uses: actions/setup-node@v4
        if: ${{ steps.bump.outputs.type != 'none' }}
        with:
          node-version: 20
          cache: npm

      - name: Bump version
        if: ${{ steps.bump.outputs.type != 'none' }}
        run: npm version ${{ steps.bump.outputs.type }} --no-git-tag-version

      - name: Commit and push
        if: ${{ steps.bump.outputs.type != 'none' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: bump version (${{ steps.bump.outputs.type }})"
          git push origin HEAD:${{ github.event.pull_request.base.ref }}
